<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>haz sido rickrolleadoSDKFGVJSD</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('https://raw.githubusercontent.com/watchbutdonotlearn/watchbutdonotlearn.github.io/main/youjustgotrickd.jpg') repeat;
      font-family: Arial, Helvetica, sans-serif;
      cursor: url('https://raw.githubusercontent.com/watchbutdonotlearn/watchbutdonotlearn.github.io/main/rick.PNG'), auto;
    }
    .container {
      background-color: white;
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transform: rotate(0.5deg);
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 720px;
      margin: 20px 0;
    }
    h1 { 
      font-size: 3.2em; 
      margin: 15px 0; 
    }

    #clickBanner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: #ffff00;
      color: #000;
      text-align: center;
      padding: 12px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="clickBanner" onclick="activarAudio()">
    🎵 Haz clic aquí para activar el audio 🎵
  </div>

  <div class="container">
    <p><strong>Acabas de ser rickrolleaodxd</strong></p>
    <h1>KAJSDKSA</h1>
    
    <p><a href="https://github.com/Mixiruri" target="_blank">Si viniste buscando un "acerca de mí", haz clic aquí!</a></p>
    
    <!-- Video corregido -->
    <video autoplay loop muted playsinline>
      <source src="https://archive.org/download/Rick_Astley_Never_Gonna_Give_You_Up/Rick_Astley_Never_Gonna_Give_You_Up.mp4" type="video/mp4">
    </video>

    <p>Encuentra mis otros proyectos en mi <a href="https://github.com/Mixiruri" target="_blank">página de Github</a>!</p>
    <p>El código fuente está <a href="https://github.com/Mixiruri/rickroll" target="_blank">aquí</a>!</p>
    <p>Contáctame en Discord: <strong>@nnenaza</strong></p>
  </div>

  <!-- MÚSICA Never Gonna Give You Up -->
  <audio id="rickAudio" loop>
    <source src="https://ia801402.us.archive.org/7/items/NeverGonnaGiveYouUp/Never%20Gonna%20Give%20You%20Up.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('rickAudio');
    const banner = document.getElementById('clickBanner');

    function activarAudio() {
      audio.volume = 0.8;
      audio.play().then(() => {
        banner.style.display = 'none';
      });
    }

    window.addEventListener('load', () => {
      audio.play().catch(() => {
        banner.style.display = 'block';
      });
    });
  </script>
</body>
</html>
