<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>haz sido rickrolleadoSDKFGVJSD</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('https://raw.githubusercontent.com/watchbutdonotlearn/watchbutdonotlearn.github.io/main/youjustgotrickd.jpg') repeat;
      font-family: Arial, Helvetica, sans-serif;
      cursor: url('https://raw.githubusercontent.com/watchbutdonotlearn/watchbutdonotlearn.github.io/main/rick.PNG'), auto;
    }
    .container {
      background-color: white;
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transform: rotate(0.5deg);
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 720px;
      margin: 20px 0;
    }
    h1 { 
      font-size: 3.2em; 
      margin: 15px 0; 
    }
  </style>
</head>
<body>

  <div class="container">
    <p><strong>Acabas de ser rickrolleaodxd</strong></p>
    <h1>KAJSDKSA</h1>
    
    <p><a href="https://github.com/Mixiruri" target="_blank">Si viniste buscando un "acerca de mí", haz clic aquí!</a></p>
    
    <video autoplay loop muted playsinline id="rickVideo">
      <source src="https://raw.githubusercontent.com/watchbutdonotlearn/watchbutdonotlearn.github.io/main/rickroll3.mp4" type="video/mp4">
    </video>

    <p>Encuentra mis otros proyectos en mi <a href="https://github.com/Mixiruri" target="_blank">página de Github</a>!</p>
    <p>El código fuente está <a href="https://github.com/Mixiruri/rickroll" target="_blank">aquí</a>!</p>
    <p>Contáctame en Discord: <strong>@nnenaza</strong></p>
  </div>

  <audio id="rickAudio" loop>
    <source src="https://ia903400.us.archive.org/1/items/NeverGonnaGiveYouUp_201903/Never%20Gonna%20Give%20You%20Up.mp3" type="audio/mpeg">
    <source src="https://ia801402.us.archive.org/7/items/NeverGonnaGiveYouUp/Never%20Gonna%20Give%20You%20Up.mp3" type="audio/mpeg">
    <source src="https://ia600107.us.archive.org/32/items/NeverGonnaGiveYouUp_201903/Never%20Gonna%20Give%20You%20Up.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('rickAudio');
    let audioActivado = false;

    function activarAudio() {
      if (audioActivado) return;
      audio.volume = 0.8;
      audio.play().then(() => {
        audioActivado = true;
      }).catch(console.warn);
    }

    // Intentar autoplay inmediato
    window.addEventListener('load', () => {
      audio.volume = 0.8;
      audio.play().then(() => {
        audioActivado = true;
      }).catch(() => {
        // Si falla, activar en cualquier interacción del usuario
        // (mousemove cuenta como interacción en la mayoría de navegadores)
        ['click', 'mousemove', 'scroll', 'keydown', 'touchstart'].forEach(evento => {
          document.addEventListener(evento, activarAudio, { once: true });
        });
      });
    });
  </script>
</body>
</html>
